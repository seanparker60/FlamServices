<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integration Factory Control Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121214; color: #e1e1e6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4af2a1; margin-bottom: 5px; }
        .carousel-container { position: relative; width: 650px; height: 460px; overflow: hidden; background: #1d1d22; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); border: 1px solid #29292e; margin-top: 20px; }
        .slide { display: none; width: 100%; height: 100%; padding: 30px; box-sizing: border-box; flex-direction: column; }
        .slide.active { display: flex; }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #29292e; padding-bottom: 15px; }
        .service-title { font-size: 24px; font-weight: bold; margin: 0; }
        .port-badge { background: #29292e; padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 14px; color: #a8a8b3; }
        .controls { display: flex; align-items: center; gap: 15px; margin: 20px 0 10px 0; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #7c7c8a; transition: background 0.3s; }
        .status-dot.online { background: #04d361; box-shadow: 0 0 10px #04d361; }
        .status-dot.offline { background: #f74040; box-shadow: 0 0 10px #f74040; }
        .btn-toggle { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-toggle.start { background: #04d361; color: #000; }
        .btn-toggle.stop { background: #f74040; color: #fff; }
        .console-box { flex-grow: 1; background: #09090a; border-radius: 6px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #00ff66; overflow-y: auto; border: 1px solid #29292e; white-space: pre-wrap; margin-top: 10px; text-shadow: 0 0 2px rgba(0, 255, 102, 0.3); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; padding: 15px 10px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .prev { left: 5px; } .next { right: 5px; }
    </style>
</head>
<body>

    <h1>Factory Service Carousel</h1>
    <div>Master Controller Dashboard</div>

    <div class="carousel-container">
        <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>

        <!-- Dynamic Service Slides Generated by JS -->
        <div id="carousel-slides"></div>
    </div>

<script>
    const socket = io();
    let currentSlideIndex = 0;
    let serviceIds = [];

    // Build the structural carousel interface when connecting
    socket.on('init', (services) => {
        const container = document.getElementById('carousel-slides');
        container.innerHTML = '';
        serviceIds = Object.keys(services);

        serviceIds.forEach((id, idx) => {
            const s = services[id];
            const activeClass = idx === 0 ? 'active' : '';
            
            container.innerHTML += `
                <div class="slide ${activeClass}" id="slide-${id}">
                    <div class="header-row">
                        <div class="service-title">${s.name}</div>
                        <div class="port-badge">PORT: ${s.port}</div>
                    </div>
                    <div class="controls">
                        <div class="status-dot ${s.status.toLowerCase()}" id="dot-${id}"></div>
                        <span id="text-${id}">${s.status}</span>
                        <button class="btn-toggle ${s.status === 'Online' ? 'stop' : 'start'}" 
                                id="btn-${id}" onclick="toggleService('${id}')">
                            ${s.status === 'Online' ? 'SHUTDOWN' : 'BOOT UP'}
                        </button>
                    </div>
                    <div class="console-box" id="console-${id}">[System Initialized - Awaiting Boot]</div>
                </div>
            `;
        });
    });

    // Real-time server state tracking
    socket.on('status-change', ({ id, status }) => {
        const dot = document.getElementById(`dot-${id}`);
        const text = document.getElementById(`text-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        
        if(dot && text && btn) {
            text.innerText = status;
            dot.className = `status-dot ${status.toLowerCase()}`;
            btn.innerText = status === 'Online' ? 'SHUTDOWN' : 'BOOT UP';
            btn.className = `btn-toggle ${status === 'Online' ? 'stop' : 'start'}`;
        }
    });

    // Capture logs flowing out of ports and append them to the UI
    socket.on('log', ({ id, text }) => {
        const consoleBox = document.getElementById(`console-${id}`);
        if (consoleBox) {
            // Remove initialization placeholder on first clean log entry
            if(consoleBox.innerText.includes('[System Initialized')) consoleBox.innerText = '';
            
            consoleBox.innerText += `\n${text}`;
            consoleBox.scrollTop = consoleBox.scrollHeight; // Auto Scroll down
        }
    });

    function toggleService(id) {
        const btn = document.getElementById(`btn-${id}`);
        const action = btn.classList.contains('start') ? 'start' : 'stop';
        socket.emit('toggle-service', { id, action });
    }

    // Carousel Slide Engine
    function moveSlide(direction) {
        const slides = document.querySelectorAll('.slide');
        if (slides.length === 0) return;

        slides[currentSlideIndex].classList.remove('active');
        currentSlideIndex = (currentSlideIndex + direction + slides.length) % slides.length;
        slides[currentSlideIndex].classList.add('active');
    }
</script>
<div id="queue-stats" style="background: #1d1d22; padding: 15px; margin-top: 20px; border-radius: 8px; width: 620px; border: 1px solid #29292e;">
    <h3>Salesforce Sync Metrics</h3>
    <ul id="stats-list">Loading queue metrics...</ul>
</div>

<script>
    // Run this function when the page loads to pull data from the /stats endpoint
    async function updateDatabaseStats() {
        try {
            const res = await fetch('/stats'); // Hits the virtual route
            const data = await res.json();
            
            const list = document.getElementById('stats-list');
            list.innerHTML = data.counts.map(c => 
                `<li><strong>${c.status.toUpperCase()}:</strong> ${c.count} records</li>`
            ).join('');
        } catch (err) {
            console.error("Could not load stats", err);
        }
    }

    // Refresh metrics every 10 seconds
    updateDatabaseStats();
    setInterval(updateDatabaseStats, 10000);
</script>
</body>
</html>
