<!DOCTYPE html>
<html>
<head>
    <title>Integration Factory Monitor</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-up { color: green; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        .PENDING { color: orange; }
        .COMPLETED { color: green; }
        .FAILED { color: red; }
    </style>
</head>
<body>
    <h1>Factory Control Center</h1>
    <div class="grid">
        <div class="card">
            <h3>Service Status</h3>
            <p>Gateway: <span class="status-up">ONLINE</span></p>
            <p>Accounts Svc: <span class="status-up">ONLINE</span></p>
            <p>Orders Svc: <span class="status-up">ONLINE</span></p>
        </div>
        <div id="stats-container" class="card">
            <h3>Sync Queue Summary</h3>
            </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Recent Sync Activity</h3>
        <table id="activity-table">
            <thead>
                <tr><th>Object</th><th>Status</th><th>Attempts</th><th>Time</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function updateDashboard() {
            const res = await fetch('/dashboard/stats');
            const data = await res.json();
            
            // Update Summary
            const statsHtml = data.counts.map(c => `<p>${c.status}: <strong>${c.count}</strong></p>`).join('');
            document.getElementById('stats-container').innerHTML = `<h3>Sync Queue Summary</h3>` + statsHtml;

            // Update Table
            const tableBody = data.recent.map(r => `
                <tr>
                    <td>${r.object_type}</td>
                    <td class="${r.status}">${r.status}</td>
                    <td>${r.attempts}</td>
                    <td>${new Date(r.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
            document.querySelector('#activity-table tbody').innerHTML = tableBody;
        }

        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
